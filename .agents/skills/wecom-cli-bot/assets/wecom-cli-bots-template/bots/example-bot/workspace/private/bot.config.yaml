bot:
  name: example-bot
  session_idle_ttl_seconds: 10800
  stop_keyword: "/stop"
  thinking_message: "正在思考...\n/stop 终止\n/help 帮助"
  busy_message: "当前任务仍在运行，请发送 /stop 终止后再发送新问题。"

wecom:
  bot_id_env: WECOM_BOT_ID
  secret_env: WECOM_BOT_SECRET

cli:
  provider: kiro-cli
  command: kiro-cli
  args: ["chat", "--no-interactive", "--trust-all-tools", "{{prompt}}"]
  input_mode: arg
  prompt_placeholder: "{{prompt}}"
  stream_output: stdout
  stop_signal: SIGTERM
  kill_after_ms: 10000
  timeout_seconds: 10800
  env:
    KIRO_HOME: "./bots/example-bot/workspace/cli-home/kiro"
    KIRO_HOST_AUTH_DIR: "/host/kiro-auth"

memory:
  enabled: true
  api_url_env: MEMORY_API_URL
  namespace_env: MEMORY_NAMESPACE
  auto_retrieve: true
  auto_store: true
  retrieve_limit: 5

documents:
  shared_dir: /shared/docs
