bot:
  name: example-bot
  session_idle_ttl_seconds: 10800
  stop_keyword: "/stop"
  thinking_message: "正在思考...\n/stop 终止\n/help 帮助"
  busy_message: "当前任务仍在运行，请发送 /stop 终止后再发送新问题。"

wecom:
  bot_id_env: WECOM_BOT_ID
  secret_env: WECOM_BOT_SECRET

# --- Provider: Codex (default) ---
cli:
  provider: codex
  command: codex
  args: []
  input_mode: stdin
  stream_output: stdout
  stop_signal: SIGTERM
  kill_after_ms: 10000
  timeout_seconds: 10800
  env:
    CODEX_HOME: "./bots/example-bot/workspace/cli-home/codex"

